<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Important Question 👀</title>



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>



<body>



<div class="hearts-bg"></div>



<div class="container">

    <p class="small-text">⚠️ very serious question</p>



    <h1>

        so… um 😅<br>

        will you be my girlfriend?

    </h1>



    <p class="subtext">

        I promise I’ll treat you right… and make you laugh more than you expect 😊💕

    </p>



    <div class="gif-container">

        <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif">

    </div>



    <div class="buttons">

        <button id="yes-btn" onclick="handleYesClick()">YES 😌💖</button>

        <button id="no-btn" onclick="handleNoClick()">Are you sure? 😳</button>

    </div>



    <div id="tease-toast"></div>

</div>



<audio id="bg-music" loop>

    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">

</audio>



<button id="music-toggle">🎵</button>



<script src="script.js"></script>
